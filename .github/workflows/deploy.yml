name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [server, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Type-check ${{ matrix.workspace }}
        run: |
          cd ${{ matrix.workspace }}
          npx tsc --noEmit

  e2e-test:
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Install Playwright browsers
        run: cd client && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd client && npx playwright test --reporter=html,list
        env:
          CI: 'true'

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/

  deploy:
    needs: [typecheck, e2e-test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 152.53.184.198
          username: viktor
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/apps/course-notifier-stable
            git pull
            docker compose -f docker-compose.vps.yml --env-file .env.docker build --no-cache
            docker compose -f docker-compose.vps.yml --env-file .env.docker up -d
            docker compose -f docker-compose.vps.yml --env-file .env.docker ps
